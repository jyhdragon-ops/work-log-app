name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Build & Deploy
        run: |
          COMMIT_SHA="${{ github.sha }}"
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeployV2(serviceId: \\\"ba1a4088-7e2f-4b38-9fd1-9ecb193cfca9\\\", environmentId: \\\"c6f3ce38-39f8-4fab-94ce-2bd3e8ff5b40\\\", commitSha: \\\"$COMMIT_SHA\\\") }\"}"
